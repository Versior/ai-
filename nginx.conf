# ============================================
# Versior AI 电台 - Nginx 反向代理配置
# 公网部署：HTTP + WebSocket + 前端静态文件
# ============================================
#
# 使用方法：
# 1. 复制到服务器: /etc/nginx/conf.d/versior.conf
# 2. 修改 server_name 为你的域名
# 3. 如果使用 SSL，取消 443 server 块的注释
# 4. nginx -t && nginx -s reload
# ============================================

# HTTP → HTTPS 重定向（推荐）
server {
    listen 80;
    server_name your-domain.com;

    # Let's Encrypt 验证（首次申请证书时需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主服务
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # ===== SSL 证书（用 certbot 申请）=====
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ===== 基本设置 =====
    client_max_body_size 10m;
    proxy_read_timeout 300s;

    # ===== API + WebSocket =====
    location / {
        proxy_pass http://versior-radio:8834;
        proxy_http_version 1.1;

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 透传真实 IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 音频流支持（Range 请求）
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_cache off;
    }
}
