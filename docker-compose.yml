# ============================================
# Versior AI 电台 - Docker Compose
#
# 一键部署: docker compose up -d
# 查看日志: docker compose logs -f
# 停止:     docker compose down
# 更新:     docker compose pull && docker compose up -d
#
# 多架构构建 (amd64 + arm64):
#   docker buildx create --use --name multiarch 2>/dev/null || true
#   docker buildx build --platform linux/amd64,linux/arm64 \
#     -t versior/ai:latest --push .
#
# 注意：netease-api 代理容器需要单独启动：
#   docker run -d --name netease-api -p 9934:3000 --restart unless-stopped binaryify/netease_cloud_music_api:latest
# ============================================

services:
  versior-radio:
    image: versior/ai:latest
    container_name: versior-radio
    ports:
      - "8834:8834"
    volumes:
      - ./data/.env:/app/backend/.env
      - ./data/user-music-prefs.json:/app/backend/src/user-music-prefs.json
      - ./data/logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=8834
      - MUSIC_API_URL=http://host.docker.internal:9934
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8834/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
