# ============================================
# Versior AI 电台 - Docker Compose
#
# 一键部署: docker compose up -d
# 查看日志: docker compose logs -f
# 停止:     docker compose down
# 更新:     docker compose pull && docker compose up -d
#
# 多架构构建 (amd64 + arm64):
#   docker buildx create --use --name multiarch 2>/dev/null || true
#   docker buildx build --platform linux/amd64,linux/arm64 \
#     -t versior/ai:latest --push .
# ============================================

services:
  # 网易云音乐 API 代理（搜索/播放链接/详情/热评）
  netease-api:
    image: binaryify/netease_cloud_music_api:latest
    container_name: netease-api
    ports:
      - "9934:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/cloudsearch?keywords=test&limit=1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 10s

  versior-radio:
    image: versior/ai:latest
    container_name: versior-radio
    ports:
      - "8834:8834"
    volumes:
      - ./data/.env:/app/backend/.env
      - ./data/user-music-prefs.json:/app/backend/src/user-music-prefs.json
      - ./data/logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=8834
      - MUSIC_API_URL=http://netease-api:3000
    depends_on:
      netease-api:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8834/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
